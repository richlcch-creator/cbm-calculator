<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進階外銷材積 (CBM / 才數) 計算機</title>
    <style>
        :root {
            --primary: #4F46E5;
            --bg: #F3F4F6;
            --surface: #FFFFFF;
            --text: #1F2937;
            --border: #E5E7EB;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: var(--surface);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            text-align: center;
            font-size: 24px;
            margin-top: 0;
            color: var(--primary);
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
            color: #4B5563;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #4338CA;
        }
        .results {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px dashed var(--border);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .result-box {
            background: var(--bg);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .result-label {
            font-size: 12px;
            color: #6B7280;
            margin-bottom: 5px;
        }
        .result-value {
            font-size: 20px;
            font-weight: bold;
            color: var(--text);
        }
        .highlight {
            color: var(--primary);
        }
        .highlight-bg {
            background-color: #EEF2FF;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📦 材積 (CBM / 才數) 計算機</h1>
        
        <div class="input-group">
            <label for="length">外箱長度 (公分 cm)</label>
            <input type="number" id="length" placeholder="例如: 50" min="0">
        </div>
        <div class="input-group">
            <label for="width">外箱寬度 (公分 cm)</label>
            <input type="number" id="width" placeholder="例如: 40" min="0">
        </div>
        <div class="input-group">
            <label for="height">外箱高度 (公分 cm)</label>
            <input type="number" id="height" placeholder="例如: 30" min="0">
        </div>
        <div class="input-group">
            <label for="quantity">總箱數 (Cartons)</label>
            <input type="number" id="quantity" placeholder="例如: 100" min="0">
        </div>

        <button onclick="calculate()">開始計算</button>

        <div class="results">
            <div class="result-box">
                <div class="result-label">單箱 CBM</div>
                <div class="result-value" id="cbm-per-carton">0.0000</div>
            </div>
            <div class="result-box">
                <div class="result-label">單箱才數 (CUFT)</div>
                <div class="result-value" id="cuft-per-carton">0.00</div>
            </div>
            <div class="result-box highlight-bg">
                <div class="result-label highlight">總 CBM</div>
                <div class="result-value highlight" id="total-cbm">0.0000</div>
            </div>
            <div class="result-box highlight-bg">
                <div class="result-label highlight">總才數 (Total CUFT)</div>
                <div class="result-value highlight" id="total-cuft">0.00</div>
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            // 取得輸入的值，如果沒有輸入就當作 0
            const l = parseFloat(document.getElementById('length').value) || 0;
            const w = parseFloat(document.getElementById('width').value) || 0;
            const h = parseFloat(document.getElementById('height').value) || 0;
            const q = parseFloat(document.getElementById('quantity').value) || 0;

            // 計算單箱 CBM (長x寬x高 / 1,000,000)
            const cbmPerCarton = (l * w * h) / 1000000;
            
            // 計算單箱才數 (國際標準換算: 1 CBM 約等於 35.3146 CUFT)
            const cuftPerCarton = cbmPerCarton * 35.3146;

            // 計算總數
            const totalCbm = cbmPerCarton * q;
            const totalCuft = cuftPerCarton * q;

            // 更新畫面顯示 (CBM 取小數點後四位，才數取兩位)
            document.getElementById('cbm-per-carton').innerText = cbmPerCarton.toFixed(4);
            document.getElementById('cuft-per-carton').innerText = cuftPerCarton.toFixed(2);
            document.getElementById('total-cbm').innerText = totalCbm.toFixed(4);
            document.getElementById('total-cuft').innerText = totalCuft.toFixed(2);
        }
    </script>
</body>
</html>
