<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>外銷材積（CBM）計算機</title>

  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --background: #f3f6fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #697386;
      --border: #dce3ee;
      --result-bg: #eef5ff;
      --danger: #dc2626;
      --shadow: 0 18px 45px rgba(30, 41, 59, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family:
        Inter, "Noto Sans TC", "Microsoft JhengHei",
        system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #dbeafe 0, transparent 35%),
        linear-gradient(135deg, var(--background), #eef2f7);
    }

    .calculator {
      width: 100%;
      max-width: 620px;
      padding: 36px;
      background: var(--card);
      border: 1px solid rgba(220, 227, 238, 0.8);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .header {
      margin-bottom: 28px;
      text-align: center;
    }

    .header-icon {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      margin: 0 auto 16px;
      border-radius: 18px;
      color: #ffffff;
      background: linear-gradient(135deg, #2563eb, #60a5fa);
      font-size: 28px;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.25);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.7rem, 5vw, 2.2rem);
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.6;
    }

    .input-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.92rem;
      font-weight: 700;
    }

    .input-wrapper {
      position: relative;
    }

    input {
      width: 100%;
      height: 52px;
      padding: 0 58px 0 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      color: var(--text);
      background: #ffffff;
      font: inherit;
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    input::placeholder {
      color: #a1a9b8;
    }

    .unit {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.86rem;
      pointer-events: none;
    }

    .calculate-button {
      width: 100%;
      height: 54px;
      margin-top: 24px;
      border: 0;
      border-radius: 13px;
      color: #ffffff;
      background: var(--primary);
      font: inherit;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s, box-shadow 0.2s;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.22);
    }

    .calculate-button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .calculate-button:active {
      transform: translateY(0);
    }

    .message {
      min-height: 22px;
      margin: 12px 0 0;
      color: var(--danger);
      font-size: 0.9rem;
      text-align: center;
    }

    .result {
      margin-top: 12px;
      padding: 22px;
      border: 1px solid #bfdbfe;
      border-radius: 16px;
      background: var(--result-bg);
      text-align: center;
    }

    .result-label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .result-value {
      display: block;
      color: var(--primary);
      font-size: clamp(2rem, 8vw, 2.8rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      overflow-wrap: anywhere;
    }

    .formula {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.6;
    }

    @media (max-width: 560px) {
      .calculator {
        padding: 26px 20px;
        border-radius: 20px;
      }

      .input-grid {
        grid-template-columns: 1fr;
        gap: 15px;
      }
    }
  </style>
</head>

<body>
  <main class="calculator">
    <header class="header">
      <div class="header-icon" aria-hidden="true">▣</div>
      <h1>外銷材積計算機</h1>
      <p class="subtitle">
        輸入單一外箱尺寸與總箱數，即可計算總材積（CBM）。
      </p>
    </header>

    <form id="cbmForm" novalidate>
      <div class="input-grid">
        <div class="field">
          <label for="length">外箱長度</label>
          <div class="input-wrapper">
            <input
              id="length"
              type="number"
              min="0"
              step="any"
              inputmode="decimal"
              placeholder="例如：60"
              required
            />
            <span class="unit">cm</span>
          </div>
        </div>

        <div class="field">
          <label for="width">外箱寬度</label>
          <div class="input-wrapper">
            <input
              id="width"
              type="number"
              min="0"
              step="any"
              inputmode="decimal"
              placeholder="例如：40"
              required
            />
            <span class="unit">cm</span>
          </div>
        </div>

        <div class="field">
          <label for="height">外箱高度</label>
          <div class="input-wrapper">
            <input
              id="height"
              type="number"
              min="0"
              step="any"
              inputmode="decimal"
              placeholder="例如：35"
              required
            />
            <span class="unit">cm</span>
          </div>
        </div>

        <div class="field">
          <label for="quantity">總箱數</label>
          <div class="input-wrapper">
            <input
              id="quantity"
              type="number"
              min="1"
              step="1"
              inputmode="numeric"
              placeholder="例如：120"
              required
            />
            <span class="unit">箱</span>
          </div>
        </div>
      </div>

      <button class="calculate-button" type="submit">
        計算總材積
      </button>

      <p id="message" class="message" role="alert" aria-live="polite"></p>
    </form>

    <section class="result" aria-live="polite">
      <span class="result-label">總材積（CBM）</span>
      <strong id="result" class="result-value">0.0000</strong>
      <p class="formula">
        計算公式：長 × 寬 × 高 × 箱數 ÷ 1,000,000
      </p>
    </section>
  </main>

  <script>
    const form = document.getElementById("cbmForm");
    const resultElement = document.getElementById("result");
    const messageElement = document.getElementById("message");

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const length = Number(document.getElementById("length").value);
      const width = Number(document.getElementById("width").value);
      const height = Number(document.getElementById("height").value);
      const quantity = Number(document.getElementById("quantity").value);

      const values = [length, width, height, quantity];

      if (values.some((value) => !Number.isFinite(value) || value <= 0)) {
        messageElement.textContent = "請輸入大於 0 的有效數字。";
        resultElement.textContent = "0.0000";
        return;
      }

      if (!Number.isInteger(quantity)) {
        messageElement.textContent = "總箱數請輸入整數。";
        resultElement.textContent = "0.0000";
        return;
      }

      const totalCbm = (length * width * height * quantity) / 1000000;

      messageElement.textContent = "";
      resultElement.textContent = totalCbm.toLocaleString("zh-TW", {
        minimumFractionDigits: 4,
        maximumFractionDigits: 6
      });
    });
  </script>
</body>
</html>
