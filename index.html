<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="外銷材積 CBM 與才積計算機" />
  <title>外銷材積（CBM）計算機</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-soft: #eff6ff;
      --background: #f4f7fb;
      --surface: #ffffff;
      --text: #172033;
      --muted: #6b7280;
      --border: #dce3ed;
      --danger: #dc2626;
      --shadow: 0 22px 55px rgba(30, 41, 59, 0.13);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #dbeafe 0, transparent 34%),
        radial-gradient(circle at bottom right, #e0e7ff 0, transparent 30%),
        var(--background);
      font-family: Inter, "Noto Sans TC", "Microsoft JhengHei", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .calculator {
      width: min(100%, 760px);
      padding: 34px;
      border: 1px solid rgba(220, 227, 237, 0.9);
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
    }
    .header { margin-bottom: 28px; text-align: center; }
    .icon {
      width: 62px;
      height: 62px;
      display: grid;
      place-items: center;
      margin: 0 auto 16px;
      border-radius: 19px;
      color: #fff;
      background: linear-gradient(135deg, #2563eb, #60a5fa);
      box-shadow: 0 12px 25px rgba(37, 99, 235, 0.24);
      font-size: 29px;
      font-weight: 900;
    }
    h1 { margin: 0 0 9px; font-size: clamp(1.65rem, 4vw, 2.2rem); }
    .subtitle { margin: 0; color: var(--muted); font-size: 0.95rem; line-height: 1.65; }
    .unit-panel {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      padding: 14px 16px;
      border: 1px solid #bfdbfe;
      border-radius: 14px;
      background: var(--primary-soft);
    }
    .unit-panel label, .field label { font-size: 0.94rem; font-weight: 800; }
    .field label { display: block; margin-bottom: 8px; }
    select {
      min-width: 140px;
      height: 43px;
      padding: 0 38px 0 13px;
      border: 1px solid #93c5fd;
      border-radius: 10px;
      outline: none;
      color: var(--text);
      background: #fff;
      font: inherit;
      font-weight: 700;
    }
    .input-grid, .results {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }
    .input-wrapper { position: relative; }
    input {
      width: 100%;
      height: 52px;
      padding: 0 68px 0 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      color: var(--text);
      background: var(--surface);
      font: inherit;
      font-size: 1rem;
    }
    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }
    .input-unit {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
      pointer-events: none;
    }
    .calculate-button {
      width: 100%;
      height: 55px;
      margin-top: 24px;
      border: 0;
      border-radius: 13px;
      color: #fff;
      background: var(--primary);
      font: inherit;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 11px 24px rgba(37, 99, 235, 0.22);
    }
    .calculate-button:hover { background: var(--primary-dark); }
    .message {
      min-height: 22px;
      margin: 12px 0 0;
      color: var(--danger);
      font-size: 0.9rem;
      font-weight: 700;
      text-align: center;
    }
    .results { margin-top: 10px; gap: 14px; }
    .result-card {
      padding: 20px 16px;
      border: 1px solid #dbe5f2;
      border-radius: 16px;
      background: #f8fafc;
      text-align: center;
    }
    .result-card.primary { border-color: #bfdbfe; background: var(--primary-soft); }
    .result-label {
      display: block;
      margin-bottom: 9px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 800;
    }
    .result-value {
      display: block;
      color: var(--text);
      font-size: clamp(1.45rem, 4vw, 2rem);
      font-weight: 900;
      overflow-wrap: anywhere;
    }
    .result-card.primary .result-value { color: var(--primary); }
    .notes {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.75;
    }
    .notes p { margin: 3px 0; }
    @media (max-width: 620px) {
      .calculator { padding: 26px 20px; border-radius: 21px; }
      .input-grid, .results { grid-template-columns: 1fr; }
      .unit-panel { align-items: flex-start; flex-direction: column; }
      select { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="calculator">
    <header class="header">
      <div class="icon" aria-hidden="true">▣</div>
      <h1>外銷材積計算機</h1>
      <p class="subtitle">輸入外箱尺寸與總箱數，即時計算單箱及總計的 CBM 與才積。</p>
    </header>

    <form id="cbmForm" novalidate>
      <div class="unit-panel">
        <label for="dimensionUnit">外箱尺寸單位</label>
        <select id="dimensionUnit">
          <option value="cm">公分（cm）</option>
          <option value="tai-fen">台分</option>
        </select>
      </div>

      <div class="input-grid">
        <div class="field">
          <label for="length">外箱長度</label>
          <div class="input-wrapper">
            <input id="length" type="number" min="0" step="any" placeholder="例如：60" required />
            <span class="input-unit dimension-unit-label">cm</span>
          </div>
        </div>
        <div class="field">
          <label for="width">外箱寬度</label>
          <div class="input-wrapper">
            <input id="width" type="number" min="0" step="any" placeholder="例如：40" required />
            <span class="input-unit dimension-unit-label">cm</span>
          </div>
        </div>
        <div class="field">
          <label for="height">外箱高度</label>
          <div class="input-wrapper">
            <input id="height" type="number" min="0" step="any" placeholder="例如：35" required />
            <span class="input-unit dimension-unit-label">cm</span>
          </div>
        </div>
        <div class="field">
          <label for="quantity">總箱數</label>
          <div class="input-wrapper">
            <input id="quantity" type="number" min="1" step="1" placeholder="例如：120" required />
            <span class="input-unit">箱</span>
          </div>
        </div>
      </div>

      <button class="calculate-button" type="submit">計算材積</button>
      <p id="message" class="message" role="alert" aria-live="polite"></p>
    </form>

    <section class="results" aria-live="polite">
      <article class="result-card primary">
        <span class="result-label">單箱材積（CBM）</span>
        <strong id="singleCbm" class="result-value">0.000000</strong>
      </article>
      <article class="result-card">
        <span class="result-label">單箱材積（才）</span>
        <strong id="singleCuft" class="result-value">0.000</strong>
      </article>
      <article class="result-card primary">
        <span class="result-label">總材積（CBM）</span>
        <strong id="totalCbm" class="result-value">0.000000</strong>
      </article>
      <article class="result-card">
        <span class="result-label">總材積（才）</span>
        <strong id="totalCuft" class="result-value">0.000</strong>
      </article>
    </section>

    <footer class="notes">
      <p>尺寸換算：1 台分 = 0.30303 公分</p>
      <p>CBM 公式：長 × 寬 × 高 ÷ 1,000,000</p>
      <p>才積以立方英呎（Cu.ft.）計算：1 CBM ≈ 35.3147 才</p>
    </footer>
  </main>

  <script>
    const CM_PER_TAI_FEN = 0.30303;
    const CUFT_PER_CBM = 35.3146667215;

    const form = document.getElementById("cbmForm");
    const unitSelect = document.getElementById("dimensionUnit");
    const unitLabels = document.querySelectorAll(".dimension-unit-label");
    const message = document.getElementById("message");

    const output = {
      singleCbm: document.getElementById("singleCbm"),
      singleCuft: document.getElementById("singleCuft"),
      totalCbm: document.getElementById("totalCbm"),
      totalCuft: document.getElementById("totalCuft")
    };

    function updateUnitLabels() {
      const label = unitSelect.value === "cm" ? "cm" : "台分";
      unitLabels.forEach(element => element.textContent = label);
    }

    function resetResults() {
      output.singleCbm.textContent = "0.000000";
      output.singleCuft.textContent = "0.000";
      output.totalCbm.textContent = "0.000000";
      output.totalCuft.textContent = "0.000";
    }

    function formatNumber(value, minimumDigits, maximumDigits) {
      return value.toLocaleString("zh-TW", {
        minimumFractionDigits: minimumDigits,
        maximumFractionDigits: maximumDigits
      });
    }

    unitSelect.addEventListener("change", updateUnitLabels);

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const lengthInput = Number(document.getElementById("length").value);
      const widthInput = Number(document.getElementById("width").value);
      const heightInput = Number(document.getElementById("height").value);
      const quantity = Number(document.getElementById("quantity").value);

      const values = [lengthInput, widthInput, heightInput, quantity];

      if (values.some(value => !Number.isFinite(value) || value <= 0)) {
        message.textContent = "請在所有欄位輸入大於 0 的有效數字。";
        resetResults();
        return;
      }

      if (!Number.isInteger(quantity)) {
        message.textContent = "總箱數請輸入大於 0 的整數。";
        resetResults();
        return;
      }

      const conversionFactor = unitSelect.value === "tai-fen" ? CM_PER_TAI_FEN : 1;
      const lengthCm = lengthInput * conversionFactor;
      const widthCm = widthInput * conversionFactor;
      const heightCm = heightInput * conversionFactor;

      const singleCbm = (lengthCm * widthCm * heightCm) / 1000000;
      const singleCuft = singleCbm * CUFT_PER_CBM;
      const totalCbm = singleCbm * quantity;
      const totalCuft = singleCuft * quantity;

      output.singleCbm.textContent = formatNumber(singleCbm, 6, 8);
      output.singleCuft.textContent = formatNumber(singleCuft, 3, 5);
      output.totalCbm.textContent = formatNumber(totalCbm, 6, 8);
      output.totalCuft.textContent = formatNumber(totalCuft, 3, 5);
      message.textContent = "";
    });

    updateUnitLabels();
  </script>
</body>
</html>
